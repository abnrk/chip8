<script>
var keymap = {
	"1": 0x1,
	"2": 0x2,
	"3": 0x3,
	"4": 0xc,
	"q": 0x4,
	"w": 0x5,
	"e": 0x6,
	"r": 0xd,
	"a": 0x7,
	"s": 0x8,
	"d": 0x9,
	"f": 0xe,
	"z": 0xa,
	"x": 0x0,
	"c": 0xb,
	"v": 0xf
};
var canvas = document.querySelector("canvas");
var ctx = canvas.getContext("2d");
var audioCtx = new AudioContext();
var gainNode = audioCtx.createGain();
var oscillator = audioCtx.createOscillator();
chip8.draw = function() {
	for(var y=0; y<32; y++) {
		for(var x=0; x<64; x++) {
			var p = chip8.display[y*64+x];
			var imageData = ctx.getImageData(0,0,64,32);
			imageData.data[(y*64+x)*4+0] = p*255;
			imageData.data[(y*64+x)*4+1] = p*255;
			imageData.data[(y*64+x)*4+2] = p*255;
			imageData.data[(y*64+x)*4+3] = 255;
			ctx.putImageData(imageData,0,0);
		}
	}
}
oscillator.type = "square";
oscillator.frequency.setValueAtTime(500,audioCtx.currentTime); // value in hertz
//oscillator.connect(audioCtx.destination);
oscillator.connect(gainNode).connect(audioCtx.destination);
addEventListener("click",function(e){
	oscillator.start();
});
addEventListener("keydown",function(e){
	chip8.keypad[keymap[e.key]] = 1;
});
addEventListener("keyup",function(e){
	chip8.keypad[keymap[e.key]] = 0;
});
setInterval(function(){
	//for(var i=0;i<5;i++){chip8.step();};
	//chip8.doFrame();
	chip8.step();
	if(chip8.st != 0) {
		gainNode.gain.value = 1;
	} else {
		gainNode.gain.value = 0;
	}
},1);
</script>
